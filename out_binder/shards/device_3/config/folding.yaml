_target_: tt_boltz.boltzgen.task.predict.predict.Predict
debug: false
data:
  _target_: tt_boltz.boltzgen.task.predict.data_from_generated.FromGeneratedDataModule
  cfg:
    _target_: tt_boltz.boltzgen.task.predict.data_from_generated.DataConfig
    tokenizer:
      _target_: tt_boltz.boltzgen.data.tokenizer.Tokenizer
      atomize_modified_residues: false
    featurizer:
      _target_: tt_boltz.boltzgen.data.featurizer.Featurizer
    suffix: .cif
    suffix_metadata: .npz
    suffix_native: _native.cif
    samples_per_target: 1000000000000000
    num_targets: 10000000000000
    moldir: /home/ttuser/.boltz/boltzgen/mols.zip
    batch_size: 1
    num_workers: 1
    disulfide_prob: 1.0
    disulfide_on: true
  design_dir: out_binder/shards/device_3/intermediate_designs_inverse_folded
  target_templates: true
  return_native: false
  fail_if_no_designs: true
  output_dir: null
  skip_existing: false
  skip_existing_kind: folded
keys_dict_out:
- min_interaction_pae
- min_design_to_target_pae
- interaction_pae
- ligand_iptm
- protein_iptm
- iptm
- design_iptm
- design_iiptm
- design_to_target_iptm
- design_residue_iptm
- design_ptm
- target_ptm
- ptm
writer:
  _target_: tt_boltz.boltzgen.task.predict.writer.FoldingWriter
  design_dir: ${data.design_dir}
trainer:
  logger: false
  devices: 1
name: null
output: out_binder/shards/device_3/intermediate_designs_inverse_folded
checkpoint: /home/ttuser/.boltz/boltzgen/boltz2_conf_final.ckpt
recycling_steps: 3
sampling_steps: 200
diffusion_samples: 5
override:
  validators: null
  use_kernels: false
